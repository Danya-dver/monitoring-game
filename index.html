<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Optimized Scene</title>

<style>
body {
  margin: 0;
  background: #05070b;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: monospace;
}

/* сцена */
.scene {
  position: relative;
  width: 900px;
  height: 600px;
  background: #0b1220;
  overflow: hidden;
}

/* окно */
.window {
  position: absolute;
  right: 60px;
  top: 40px;
  width: 260px;
  height: 200px;
  background: #0a1322;
  border: 6px solid #1a2230;
}

/* лёгкий дождь */
.rain {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.08),
    transparent 6px
  );
  opacity: 0.25;
}

/* стол (текстура через градиент) */
.desk {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 180px;
  background:
    repeating-linear-gradient(
      90deg,
      #3b2a1f,
      #3b2a1f 10px,
      #332217 10px,
      #332217 20px
    );
}

/* монитор */
.monitor {
  position: absolute;
  left: 140px;
  bottom: 140px;
  width: 520px;
  height: 340px;
  background: linear-gradient(#dcdcdc, #8f8f8f);
  border-radius: 14px;
  padding: 20px;
  transform: perspective(800px) rotateX(5deg);
}

/* экран */
.screen {
  width: 100%;
  height: 100%;
  background: #071107;
  border: 8px solid #1c1c1c;
  color: #33ff88;
  padding: 16px;
  position: relative;
}

/* CRT */
.screen::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.35),
    transparent 2px
  );
}

/* текст */
.cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: #33ff88;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* 🌵 SVG кактус */
.cactus {
  position: absolute;
  right: 140px;
  bottom: 130px;
  width: 80px;
}

/* клавиатура */
.keyboard {
  position: absolute;
  left: 160px;
  bottom: 20px;
  width: 400px;
  height: 60px;
  background: #666;
}
</style>
</head>

<body>

<div class="scene">

  <div class="window">
    <div class="rain"></div>
  </div>

  <div class="desk"></div>

  <div class="monitor">
    <div class="screen">
> login admin<br>
ACCESS GRANTED<br><br>
> check_net<br>
STATUS: OK<br><br>
> <span class="cursor"></span>
    </div>
  </div>

  <!-- SVG кактус -->
  <svg class="cactus" viewBox="0 0 100 150">
    <rect x="40" y="40" width="20" height="80" rx="10" fill="#2ecc71"/>
    <rect x="20" y="60" width="15" height="40" rx="8" fill="#2ecc71"/>
    <rect x="65" y="70" width="15" height="35" rx="8" fill="#2ecc71"/>
  </svg>

  <div class="keyboard"></div>

</div>

</body>
</html>
