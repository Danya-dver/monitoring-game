<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CRT Atmosphere v2</title>

<style>
body {
  margin: 0;
  background: #0a0d12;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: monospace;
}

/* ===== СЦЕНА ===== */
.scene {
  position: relative;
  width: 900px;
  height: 600px;
  background: radial-gradient(circle at 70% 20%, #1a2230, #05070b 80%);
  overflow: hidden;
}

/* ===== ОКНО ===== */
.window {
  position: absolute;
  right: 60px;
  top: 50px;
  width: 240px;
  height: 180px;
  background: linear-gradient(#0a1422, #020409);
  border: 6px solid #1c2330;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
  overflow: hidden;
}

/* ===== ДОЖДЬ ===== */
#rain {
  position: absolute;
  inset: 0;
}

/* ===== КАКТУС ===== */
.cactus {
  position: absolute;
  right: 130px;
  bottom: 80px;
  width: 28px;
  height: 60px;
  background: #1c7a4d;
  border-radius: 8px;
  box-shadow:
    inset -4px 0 0 rgba(0,0,0,0.4),
    0 0 10px rgba(0,255,120,0.1);
}

/* ===== МОНИТОР КОРПУС ===== */
.monitor {
  position: absolute;
  left: 50px;
  top: 80px;
  width: 600px;
  height: 400px;
  background: linear-gradient(#c9c9c9, #9a9a9a);
  border-radius: 8px;
  box-shadow:
    inset 0 0 10px rgba(0,0,0,0.4),
    0 20px 40px rgba(0,0,0,0.6);
  padding: 20px;
}

/* ===== ЭКРАН (внутри) ===== */
.screen-frame {
  width: 100%;
  height: 100%;
  background: #0a0f0a;
  border: 6px solid #222;
  border-radius: 4px;
  box-shadow:
    inset 0 0 20px rgba(0,0,0,0.9),
    inset 0 0 40px rgba(0,255,120,0.08);
  position: relative;
  overflow: hidden;
}

/* ===== СВЕЧЕНИЕ ЭКРАНА НА СЦЕНУ ===== */
.screen-glow {
  position: absolute;
  left: 50px;
  top: 80px;
  width: 600px;
  height: 400px;
  pointer-events: none;
  box-shadow: 0 0 120px rgba(0,255,120,0.08);
}

/* ===== CRT ===== */
.screen {
  color: #33ff88;
  padding: 14px;
  text-shadow: 0 0 8px rgba(0,255,120,0.8);
  animation: flicker 0.15s infinite;
  position: relative;
  height: 100%;
}

/* scanlines */
.screen::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.35) 0px,
    transparent 2px
  );
}

/* noise */
.screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("https://www.transparenttextures.com/patterns/noise.png");
  opacity: 0.2;
}

/* ===== ТЕКСТ ===== */
.terminal {
  font-size: 14px;
  white-space: pre-wrap;
}

/* ===== КУРСОР ===== */
.cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: #33ff88;
  animation: blink 1s infinite;
}

/* ===== СТАТУС ===== */
.status {
  position: absolute;
  bottom: 0;
  width: 100%;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
}

/* ===== АНИМАЦИИ ===== */
@keyframes blink {
  50% { opacity: 0; }
}

@keyframes flicker {
  0% { opacity: 0.95; }
  50% { opacity: 1; }
  100% { opacity: 0.92; }
}

</style>
</head>

<body>

<div class="scene">

  <div class="window">
    <canvas id="rain"></canvas>
  </div>

  <div class="cactus"></div>

  <div class="screen-glow"></div>

  <div class="monitor">
    <div class="screen-frame">
      <div class="screen">
        <div class="terminal">
> login admin
ACCESS GRANTED

> check_net
STATUS: OK

> _
<span class="cursor"></span>
        </div>

        <div class="status">
STATUS: OK | TIME: 02:41 | NET: STABLE
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = 240;
canvas.height = 180;

let drops = [];

for (let i = 0; i < 150; i++) {
  drops.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    l: Math.random() * 20 + 10,
    speed: Math.random() * 5 + 5
  });
}

function drawRain() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(180,200,255,0.5)";
  ctx.lineWidth = 1;

  drops.forEach(d => {
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x - 2, d.y + d.l); // наклон
    ctx.stroke();

    d.y += d.speed;
    d.x -= 0.5;

    if (d.y > canvas.height) {
      d.y = -20;
      d.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawRain);
}

drawRain();
</script>

</body>
</html>
