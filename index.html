<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Final Scene (Base64 Assets)</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #05070b;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== СЦЕНА ===== */
.scene {
  position: relative;
  width: 900px;
  height: 600px;
  overflow: hidden;

  background:
    radial-gradient(circle at 80% 20%, rgba(80,120,255,0.25), transparent 60%),
    #05070b;
}

/* ===== СТОЛ (PNG ТЕКСТУРА) ===== */
.desk {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 200px;

  background-image: url(#DESK_BASE64#);
  background-size: cover;
}

/* ===== МОНИТОР (PNG) ===== */
.monitor {
  position: absolute;
  left: 120px;
  bottom: 150px;
  width: 520px;
}

/* ===== ЭКРАН ===== */
.screen {
  position: absolute;
  left: 70px;
  top: 60px;
  width: 380px;
  height: 240px;

  background: #061006;
  color: #33ff88;
  padding: 12px;
  font-family: monospace;

  box-shadow: inset 0 0 40px black;
}

/* CRT */
.screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.4),
    transparent 2px
  );
}

/* ===== КАКТУС ===== */
.cactus {
  position: absolute;
  right: 120px;
  bottom: 140px;
  width: 100px;
}

/* ===== ОКНО ===== */
.window {
  position: absolute;
  right: 60px;
  top: 40px;
  width: 260px;
  height: 200px;
  background: #0a1322;
  border: 6px solid #1a2230;
}

/* дождь */
.rain {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.1),
    transparent 6px
  );
  animation: rain 0.4s linear infinite;
}

@keyframes rain {
  from { transform: translateY(-10px); }
  to { transform: translateY(10px); }
}
</style>
</head>

<body>

<div class="scene">

  <div class="window">
    <div class="rain"></div>
  </div>

  <div class="desk"></div>

  <!-- МОНИТОР PNG -->
  <img class="monitor" src="#MONITOR_BASE64#">

  <!-- ЭКРАН -->
  <div class="screen">
> login admin  
ACCESS GRANTED  

> run scan  
OK  

> _
  </div>

  <!-- КАКТУС PNG -->
  <img class="cactus" src="#CACTUS_BASE64#">

</div>

</body>
</html>
