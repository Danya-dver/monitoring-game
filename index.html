<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CRT Night Terminal</title>

<style>
/* ===== RESET ===== */
body {
  margin: 0;
  background: #0b0f14;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: monospace;
}

/* ===== SCENE ===== */
.scene {
  position: relative;
  width: 900px;
  height: 600px;
  background: radial-gradient(circle at 50% 20%, #1a2230, #0b0f14 80%);
  overflow: hidden;
}

/* ===== WINDOW ===== */
.window {
  position: absolute;
  right: 60px;
  top: 60px;
  width: 220px;
  height: 160px;
  background: linear-gradient(#0f1a2b, #05080f);
  border: 6px solid #1c2330;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
  overflow: hidden;
}

/* ===== RAIN CANVAS ===== */
#rain {
  position: absolute;
  inset: 0;
}

/* ===== CACTUS ===== */
.cactus {
  position: absolute;
  right: 120px;
  bottom: 90px;
  width: 26px;
  height: 50px;
  background: #1f8f5a;
  border-radius: 6px;
  box-shadow: inset -3px 0 0 rgba(0,0,0,0.3);
}

/* ===== MONITOR ===== */
.monitor {
  position: absolute;
  left: 60px;
  top: 80px;
  width: 560px;
  height: 360px;
  background: #0a0f0a;
  border: 12px solid #2a2a2a;
  border-radius: 6px;
  box-shadow:
    0 0 40px rgba(0,255,120,0.08),
    inset 0 0 30px rgba(0,255,120,0.05);
  overflow: hidden;
}

/* ===== CRT GLOW ===== */
.screen {
  position: relative;
  width: 100%;
  height: 100%;
  color: #33ff88;
  padding: 14px;
  text-shadow: 0 0 6px rgba(0,255,120,0.7);
  animation: flicker 0.12s infinite;
}

/* ===== SCANLINES ===== */
.screen::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.3) 0px,
    transparent 2px
  );
  pointer-events: none;
}

/* ===== NOISE ===== */
.screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
  opacity: 0.15;
  pointer-events: none;
}

/* ===== TEXT ===== */
.terminal {
  font-size: 14px;
  line-height: 1.4;
  white-space: pre-wrap;
}

/* ===== CURSOR ===== */
.cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: #33ff88;
  animation: blink 1s infinite;
}

/* ===== STATUS ===== */
.status {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.6);
  padding: 4px;
  font-size: 12px;
  border-top: 1px solid #1a1a1a;
}

/* ===== ANIMATIONS ===== */
@keyframes blink {
  50% { opacity: 0; }
}

@keyframes flicker {
  0% { opacity: 0.95; }
  50% { opacity: 1; }
  100% { opacity: 0.92; }
}

/* ===== LIGHTNING FLASH ===== */
.flash {
  position: absolute;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
}

</style>
</head>

<body>

<div class="scene">

  <div class="window">
    <canvas id="rain"></canvas>
  </div>

  <div class="cactus"></div>

  <div class="monitor">
    <div class="screen">
      <div class="terminal" id="terminal">
> login admin
ACCESS GRANTED

> check_net
STATUS: OK

> _
<span class="cursor"></span>
      </div>

      <div class="status">
STATUS: OK | TIME: 02:14 | NET: STABLE
      </div>
    </div>
  </div>

  <div class="flash" id="flash"></div>

</div>

<script>

/* ===== RAIN SYSTEM ===== */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = 220;
canvas.height = 160;

let drops = [];

for (let i = 0; i < 120; i++) {
  drops.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    l: Math.random() * 20 + 10,
    speed: Math.random() * 4 + 4
  });
}

function drawRain() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(180,200,255,0.4)";
  ctx.lineWidth = 1;

  drops.forEach(d => {
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x, d.y + d.l);
    ctx.stroke();

    d.y += d.speed;

    if (d.y > canvas.height) {
      d.y = -20;
      d.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawRain);
}

drawRain();

/* ===== LIGHTNING ===== */
function lightning() {
  const flash = document.getElementById("flash");

  if (Math.random() < 0.01) {
    flash.style.opacity = 0.8;

    setTimeout(() => {
      flash.style.opacity = 0;
    }, 100);
  }

  requestAnimationFrame(lightning);
}

lightning();

</script>

</body>
</html>
